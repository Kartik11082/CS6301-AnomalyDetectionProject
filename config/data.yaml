  - tf-ds-tscm-lambda-policy
  - tf-aws-team-cf-cr
  - awt-role-boundary
  - awt-user-boundary
  - CloudabilityPolicy
  - PowerUserAccess
  - AdministratorAccess
  - AWSOpsWorksRegisterCLI
  - AWSCodeStarServiceRole
