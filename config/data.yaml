dataset_path: data\syntheticdataset\syntheticDataset.xlsx

required_sheets:
  - policies
  - users
  - groups
  - roles

required_columns:
  policies:
    - PolicyName
    - PolicyId
    - Arn
    - PolicyObject
  users:
    - UserName
    - UserId
    - Arn
    - AttachedPolicies
  groups:
    - GroupName
    - GroupId
    - Arn
    - AttachedPolicies
    - Users
  roles:
    - RoleName
    - RoleId
    - Arn
    - AttachedPolicies

